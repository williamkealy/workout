<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --push: #e84c0a; --pull: #0a72e8; --legs: #09a84a;
  --bg: #111; --card: #1a1a1a; --card2: #222;
  --border: #2e2e2e; --text: #f0f0f0; --muted: #777; --radius: 12px;
}
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding-bottom: 120px; }

/* HEADER */
.header { padding: 20px 16px 0; display: flex; justify-content: space-between; align-items: flex-start; }
.header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; line-height: 1; }
.header-date { font-size: 13px; color: var(--muted); margin-top: 4px; }
.log-btn { background: var(--card2); border: 1px solid var(--border); color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 13px; padding: 8px 14px; border-radius: 8px; cursor: pointer; }
.log-btn:active { opacity: 0.7; }

/* TABS */
.tabs { display: flex; gap: 8px; padding: 16px 16px 0; }
.tab { flex: 1; padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; line-height: 1.2; }
.tab span { display: block; font-size: 11px; font-weight: 500; font-family: 'Barlow', sans-serif; margin-top: 2px; opacity: 0.7; }
.tab.active-a { background: #2a1008; border-color: var(--push); color: var(--push); }
.tab.active-b { background: #08162a; border-color: var(--pull); color: var(--pull); }
.tab.active-c { background: #081e10; border-color: var(--legs); color: var(--legs); }

/* BANNER */
.day-banner { margin: 14px 16px 0; padding: 12px 16px; border-radius: var(--radius); display: flex; align-items: center; justify-content: space-between; }
.day-banner.a { background: linear-gradient(135deg,#2a1008,#1a0a04); border: 1px solid #3a1a0c; }
.day-banner.b { background: linear-gradient(135deg,#08162a,#04101e); border: 1px solid #0c2040; }
.day-banner.c { background: linear-gradient(135deg,#081e10,#041408); border: 1px solid #0c2e18; }
.day-label { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; }
.day-label.a { color: var(--push); } .day-label.b { color: var(--pull); } .day-label.c { color: var(--legs); }
.day-focus { font-size: 12px; color: var(--muted); margin-top: 2px; }
.day-progress { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; }
.day-progress span { font-size: 13px; color: var(--muted); font-family: 'Barlow', sans-serif; font-weight: 400; }

/* SECTIONS */
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); padding: 14px 16px 6px; }
.phase-bar { margin: 0 16px 8px; padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.5; }
.phase-bar.warm { background: #1e1800; border-left: 3px solid #c88800; color: #d4a020; }
.phase-bar.cool { background: #001a12; border-left: 3px solid #0a8a50; color: #20c47a; }

/* EXERCISE CARD */
.exercise-card { margin: 0 16px 10px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.exercise-header { padding: 12px 14px 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.exercise-num { width: 24px; height: 24px; border-radius: 50%; background: var(--card2); font-size: 11px; font-weight: 600; color: var(--muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.exercise-info { flex: 1; }
.exercise-name { font-size: 15px; font-weight: 600; line-height: 1.2; }
.exercise-note { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; font-style: italic; }
.exercise-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
.badge-a { background: #2a1008; color: var(--push); }
.badge-b { background: #08162a; color: var(--pull); }
.badge-c { background: #081e10; color: var(--legs); }

/* SETS */
.sets-row { padding: 8px 14px 12px; border-top: 1px solid var(--border); }
.sets-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.set-hint { font-size: 11px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; color: var(--muted); }
.rest-tag { font-size: 11px; color: var(--muted); }
.sets-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.set-btn { min-width: 68px; height: 54px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--card2); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: transform 0.1s; padding: 4px 8px; gap: 2px; }
.set-btn:active { transform: scale(0.92); }
.set-num-label { font-size: 10px; font-weight: 600; color: var(--muted); line-height: 1; }
.set-data-label { font-size: 11px; font-weight: 600; color: var(--muted); line-height: 1.3; text-align: center; white-space: pre-line; }
.set-btn.done-a { background: #2a1008; border-color: var(--push); }
.set-btn.done-a .set-num-label { color: var(--push); }
.set-btn.done-a .set-data-label { color: #f0c0a0; }
.set-btn.done-b { background: #08162a; border-color: var(--pull); }
.set-btn.done-b .set-num-label { color: var(--pull); }
.set-btn.done-b .set-data-label { color: #a0c0f0; }
.set-btn.done-c { background: #081e10; border-color: var(--legs); }
.set-btn.done-c .set-num-label { color: var(--legs); }
.set-btn.done-c .set-data-label { color: #a0f0c0; }

/* FINISH */
.finish-wrap { padding: 20px 16px 0; }
.finish-btn { width: 100%; padding: 16px; border-radius: var(--radius); border: none; font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: 1px; cursor: pointer; transition: transform 0.1s; }
.finish-btn:active { transform: scale(0.98); }
.finish-a { background: var(--push); color: #fff; }
.finish-b { background: var(--pull); color: #fff; }
.finish-c { background: var(--legs); color: #fff; }

/* BOTTOM SHEET */
.backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 200; }
.backdrop.open { display: block; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #1c1c1c; border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 0 20px 44px; z-index: 201; transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); max-width: 500px; margin: 0 auto; }
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 18px; }
.sheet-title { font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700; margin-bottom: 3px; }
.sheet-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.sheet-fields { display: flex; gap: 12px; margin-bottom: 16px; }
.sheet-field { flex: 1; }
.sheet-field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.sheet-field input { width: 100%; padding: 14px 12px; background: var(--card2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 24px; font-weight: 600; text-align: center; outline: none; -moz-appearance: textfield; }
.sheet-field input::-webkit-outer-spin-button, .sheet-field input::-webkit-inner-spin-button { -webkit-appearance: none; }
.sheet-field input:focus { border-color: #555; }
.sheet-field .unit { font-size: 12px; color: var(--muted); text-align: center; margin-top: 4px; }
.sheet-actions { display: flex; gap: 10px; }
.sheet-cancel { flex: 1; padding: 14px; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 15px; cursor: pointer; }
.sheet-save { flex: 2; padding: 14px; border: none; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 0.5px; cursor: pointer; color: #fff; }
.sheet-save.col-a { background: var(--push); }
.sheet-save.col-b { background: var(--pull); }
.sheet-save.col-c { background: var(--legs); }
.sheet-clear { width: 100%; margin-top: 10px; padding: 10px; background: transparent; border: 1px solid #3a1a1a; border-radius: 8px; color: #944; font-family: 'Barlow', sans-serif; font-size: 13px; cursor: pointer; display: none; }

/* HISTORY OVERLAY */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; padding: 20px 16px; overflow-y: auto; }
.overlay.open { display: block; }
.overlay-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; max-width: 500px; margin: 0 auto; }
.overlay-title { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.close-btn { background: var(--card2); border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.log-entry { border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.log-entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.log-entry-day { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; }
.log-entry-day.a { color: var(--push); } .log-entry-day.b { color: var(--pull); } .log-entry-day.c { color: var(--legs); }
.log-entry-date { font-size: 12px; color: var(--muted); }
.log-entry-meta { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.log-ex { margin-bottom: 8px; }
.log-ex-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.log-set-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.log-set-chip { font-size: 12px; background: var(--card2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; color: var(--muted); }
.log-set-chip strong { color: var(--text); }
.log-empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
.clear-log-btn { width: 100%; margin-top: 14px; padding: 12px; background: transparent; border: 1px solid #3a1a1a; border-radius: 10px; color: #c04040; font-family: 'Barlow', sans-serif; font-size: 14px; cursor: pointer; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1e1e1e; border: 1px solid var(--border); color: var(--text); padding: 12px 24px; border-radius: 40px; font-size: 14px; font-weight: 500; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 300; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">WORKOUT TRACKER</div>
    <div class="header-date" id="today-date"></div>
  </div>
  <button class="log-btn" onclick="openLog()">History</button>
</div>

<div class="tabs">
  <button class="tab active-a" id="tab-a" onclick="switchDay('a')">DAY A<span>Push</span></button>
  <button class="tab" id="tab-b" onclick="switchDay('b')">DAY B<span>Pull</span></button>
  <button class="tab" id="tab-c" onclick="switchDay('c')">DAY C<span>Legs</span></button>
</div>

<div id="view-a"></div>
<div id="view-b" class="hidden"></div>
<div id="view-c" class="hidden"></div>

<!-- BOTTOM SHEET -->
<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title"></div>
  <div class="sheet-sub" id="sheet-sub"></div>
  <div class="sheet-fields">
    <div class="sheet-field">
      <label>Weight</label>
      <input type="number" id="inp-weight" placeholder="0" min="0" step="2.5" inputmode="decimal">
      <div class="unit">lbs</div>
    </div>
    <div class="sheet-field">
      <label>Reps</label>
      <input type="number" id="inp-reps" placeholder="0" min="0" step="1" inputmode="numeric">
      <div class="unit">reps</div>
    </div>
  </div>
  <div class="sheet-actions">
    <button class="sheet-cancel" onclick="closeSheet()">Cancel</button>
    <button class="sheet-save" id="sheet-save-btn" onclick="saveSet()">LOG SET</button>
  </div>
  <button class="sheet-clear" id="sheet-clear-btn" onclick="clearSet()">Clear this set</button>
</div>

<!-- HISTORY OVERLAY -->
<div class="overlay" id="log-overlay">
  <div class="overlay-card">
    <div class="overlay-title">
      Workout History
      <button class="close-btn" onclick="closeLog()">x</button>
    </div>
    <div id="log-content"></div>
    <button class="clear-log-btn" onclick="clearLog()">Clear all history</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var DAYS = {
  a: {
    label: 'DAY A - PUSH', focus: 'Chest / Shoulders / Triceps', color: 'a',
    warmup: '5 min light cardio + arm circles, band pull-aparts, 1 easy push-up set',
    cooldown: 'Chest doorway stretch, cross-body shoulder stretch, tricep overhead stretch (5 min)',
    exercises: [
      { name: 'Dumbbell Bench Press',     sets: 3, reps: '10-12', rest: '90s', note: 'DBs easier on shoulders when returning' },
      { name: 'Seated DB Shoulder Press', sets: 3, reps: '10-12', rest: '90s', note: 'Controlled tempo - 2s down, pause, press' },
      { name: 'Incline Dumbbell Press',   sets: 3, reps: '10-12', rest: '90s', note: '30-45 degree angle, targets upper chest' },
      { name: 'Lateral Raises',           sets: 3, reps: '12-15', rest: '60s', note: 'Lighter than you think - feel the delts, do not swing' },
      { name: 'Tricep Pushdowns',         sets: 3, reps: '12-15', rest: '60s', note: 'Cable or band - elbows pinned, squeeze at bottom' }
    ]
  },
  b: {
    label: 'DAY B - PULL', focus: 'Back / Biceps / Rear Delts', color: 'b',
    warmup: '5 min light cardio + band pull-aparts, shoulder rolls, cat-cow stretch (3x10)',
    cooldown: 'Lat hang, childs pose, bicep wall stretch, thoracic rotation (5 min)',
    exercises: [
      { name: 'Lat Pulldown',             sets: 3, reps: '10-12', rest: '90s', note: 'Pull to upper chest, full stretch at top' },
      { name: 'Seated Cable Row',         sets: 3, reps: '10-12', rest: '90s', note: 'Elbows to back pockets - neutral spine' },
      { name: 'Single-Arm DB Row',        sets: 3, reps: '10 ea', rest: '90s', note: 'Brace on bench, full range of motion' },
      { name: 'Face Pulls',               sets: 3, reps: '15',    rest: '60s', note: 'Cable or band - key for rotator cuff health, do not skip' },
      { name: 'Hammer Curls',             sets: 3, reps: '12',    rest: '60s', note: 'Neutral grip, no swinging - slow and steady' }
    ]
  },
  c: {
    label: 'DAY C - LEGS', focus: 'Quads / Hamstrings / Core', color: 'c',
    warmup: '5 min bike or walk + hip circles, leg swings, bodyweight squats (2x10 slow)',
    cooldown: 'Hip flexor stretch, pigeon pose, hamstring stretch, quad stretch (8 min)',
    exercises: [
      { name: 'Goblet Squat',             sets: 3, reps: '10-12', rest: '2 min', note: 'Start goblet - rebuilds form before loading heavy' },
      { name: 'Romanian Deadlift (RDL)',  sets: 3, reps: '10-12', rest: '90s',   note: 'Hinge at hips, slight knee bend, feel hamstrings load' },
      { name: 'Lunges / Split Squat',     sets: 3, reps: '10 ea', rest: '90s',   note: 'Split squat if knees are sensitive' },
      { name: 'Leg Press',                sets: 3, reps: '12',    rest: '90s',   note: 'Lower-back friendly - feet shoulder-width' },
      { name: 'Plank',                    sets: 3, reps: '30-45s',rest: '45s',   note: 'Elbows under shoulders, neutral spine, breathe' },
      { name: 'Dead Bug',                 sets: 3, reps: '8 ea',  rest: '45s',   note: 'Lower back pressed to floor the whole time' }
    ]
  }
};

var state = {};
var sheetCtx = null;

function todayISO() { return new Date().toISOString().split('T')[0]; }
function todayFmt() { return new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }); }

function newSetData(ex) {
  return Array(ex.sets).fill(null).map(function() { return { weight: '', reps: '', done: false }; });
}

function loadState(day) {
  try { var s = localStorage.getItem('wt3_' + day); return s ? JSON.parse(s) : null; } catch(e) { return null; }
}
function saveState(day) {
  try { localStorage.setItem('wt3_' + day, JSON.stringify(state[day])); } catch(e) {}
}
function getLog() {
  try { var l = localStorage.getItem('wt3_log'); return l ? JSON.parse(l) : []; } catch(e) { return []; }
}
function saveLog(entries) {
  try { localStorage.setItem('wt3_log', JSON.stringify(entries)); } catch(e) {}
}

function initState(day) {
  var saved = loadState(day);
  if (saved && saved.date === todayISO()) return saved;
  return { date: todayISO(), sets: DAYS[day].exercises.map(function(ex) { return newSetData(ex); }) };
}

function countDone(day) {
  var done = 0, total = 0;
  state[day].sets.forEach(function(arr) {
    arr.forEach(function(s) { total++; if (s.done) done++; });
  });
  return { done: done, total: total };
}

function renderDay(day) {
  var d = DAYS[day];
  var s = state[day];
  var cd = countDone(day);
  var col = d.color;
  var h = '';

  h += '<div class="day-banner ' + col + '">';
  h += '<div><div class="day-label ' + col + '">' + d.label + '</div>';
  h += '<div class="day-focus">' + d.focus + '</div></div>';
  h += '<div class="day-progress">' + cd.done + '<span>/' + cd.total + ' sets</span></div></div>';

  h += '<div class="section-label">Warm-up</div>';
  h += '<div class="phase-bar warm">' + d.warmup + '</div>';
  h += '<div class="section-label">Exercises</div>';

  d.exercises.forEach(function(ex, i) {
    var sets = s.sets[i];
    h += '<div class="exercise-card">';
    h += '<div class="exercise-header">';
    h += '<div class="exercise-num">' + (i+1) + '</div>';
    h += '<div class="exercise-info">';
    h += '<div class="exercise-name">' + ex.name + '</div>';
    h += '<div class="exercise-note">' + ex.note + '</div>';
    h += '</div>';
    h += '<div class="exercise-badge badge-' + col + '">' + ex.sets + 'x' + ex.reps + '</div>';
    h += '</div>';
    h += '<div class="sets-row">';
    h += '<div class="sets-header"><span class="set-hint">Tap set to log weight + reps</span><span class="rest-tag">Rest ' + ex.rest + '</span></div>';
    h += '<div class="sets-grid">';
    sets.forEach(function(sv, si) {
      var cls = sv.done ? 'done-' + col : '';
      var dataLine = '';
      if (sv.done) {
        if (sv.weight && sv.reps) dataLine = sv.weight + 'lb\n' + sv.reps + ' reps';
        else if (sv.weight) dataLine = sv.weight + ' lbs';
        else if (sv.reps) dataLine = sv.reps + ' reps';
        else dataLine = 'done';
      } else {
        dataLine = '--';
      }
      h += '<div class="set-btn ' + cls + '" onclick="openSheet(\'' + day + '\',' + i + ',' + si + ')">';
      h += '<div class="set-num-label">SET ' + (si+1) + '</div>';
      h += '<div class="set-data-label">' + dataLine + '</div>';
      h += '</div>';
    });
    h += '</div></div></div>';
  });

  h += '<div class="section-label">Cool-down</div>';
  h += '<div class="phase-bar cool">' + d.cooldown + '</div>';
  h += '<div class="finish-wrap"><button class="finish-btn finish-' + col + '" onclick="finish(\'' + day + '\')">';
  h += (cd.done === cd.total ? 'COMPLETE - LOG WORKOUT' : 'LOG WORKOUT');
  h += '</button></div>';

  document.getElementById('view-' + day).innerHTML = h;
}

function openSheet(day, ei, si) {
  sheetCtx = { day: day, ei: ei, si: si };
  var ex = DAYS[day].exercises[ei];
  var sv = state[day].sets[ei][si];
  var col = DAYS[day].color;

  document.getElementById('sheet-title').textContent = ex.name;
  document.getElementById('sheet-sub').textContent = 'Set ' + (si+1) + ' of ' + ex.sets + '  |  Target: ' + ex.reps;
  document.getElementById('inp-weight').value = sv.weight || '';
  document.getElementById('inp-reps').value = sv.reps || '';
  document.getElementById('sheet-save-btn').className = 'sheet-save col-' + col;
  document.getElementById('sheet-clear-btn').style.display = sv.done ? 'block' : 'none';

  document.getElementById('backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  setTimeout(function() { document.getElementById('inp-weight').focus(); }, 320);
}

function closeSheet() {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  sheetCtx = null;
}

function saveSet() {
  if (!sheetCtx) return;
  var day = sheetCtx.day, ei = sheetCtx.ei, si = sheetCtx.si;
  var w = document.getElementById('inp-weight').value.trim();
  var r = document.getElementById('inp-reps').value.trim();
  state[day].sets[ei][si] = { weight: w, reps: r, done: true };
  saveState(day);
  closeSheet();
  renderDay(day);
  showToast('Set ' + (si+1) + ' logged');
}

function clearSet() {
  if (!sheetCtx) return;
  var day = sheetCtx.day, ei = sheetCtx.ei, si = sheetCtx.si;
  state[day].sets[ei][si] = { weight: '', reps: '', done: false };
  saveState(day);
  closeSheet();
  renderDay(day);
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter' && sheetCtx) saveSet(); });

function switchDay(day) {
  ['a','b','c'].forEach(function(d) {
    document.getElementById('view-' + d).classList.toggle('hidden', d !== day);
    var t = document.getElementById('tab-' + d);
    t.className = 'tab';
    if (d === day) t.classList.add('active-' + d);
  });
}

function finish(day) {
  var cd = countDone(day);
  var d = DAYS[day];
  var log = getLog();
  var entry = {
    day: day, dayLabel: d.label, focus: d.focus,
    date: todayISO(), dateFmt: todayFmt(),
    done: cd.done, total: cd.total,
    exercises: d.exercises.map(function(ex, i) {
      return {
        name: ex.name,
        sets: state[day].sets[i].map(function(sv, si) {
          return { setNum: si+1, weight: sv.weight, reps: sv.reps, done: sv.done };
        })
      };
    })
  };
  log.unshift(entry);
  saveLog(log);
  state[day] = { date: todayISO(), sets: DAYS[day].exercises.map(function(ex) { return newSetData(ex); }) };
  saveState(day);
  renderDay(day);
  showToast(cd.done === cd.total ? 'Workout logged!' : 'Logged - ' + cd.done + '/' + cd.total + ' sets');
}

function openLog() {
  var log = getLog();
  var el = document.getElementById('log-content');
  if (!log.length) {
    el.innerHTML = '<div class="log-empty">No workouts logged yet.<br>Complete a session and tap Log Workout.</div>';
  } else {
    el.innerHTML = log.map(function(e) {
      var exHtml = (e.exercises || []).map(function(ex) {
        var chips = (ex.sets || []).map(function(sv) {
          var val = sv.done
            ? ((sv.weight ? sv.weight + 'lb' : '') + (sv.weight && sv.reps ? ' / ' : '') + (sv.reps ? sv.reps + ' reps' : '') || 'done')
            : 'skipped';
          return '<span class="log-set-chip">S' + sv.setNum + ': <strong>' + val + '</strong></span>';
        }).join('');
        return '<div class="log-ex"><div class="log-ex-name">' + ex.name + '</div><div class="log-set-chips">' + chips + '</div></div>';
      }).join('');
      return '<div class="log-entry">'
        + '<div class="log-entry-header"><div class="log-entry-day ' + e.day + '">' + e.dayLabel + '</div><div class="log-entry-date">' + e.dateFmt + '</div></div>'
        + '<div class="log-entry-meta">' + e.done + '/' + e.total + ' sets completed</div>'
        + exHtml + '</div>';
    }).join('');
  }
  document.getElementById('log-overlay').classList.add('open');
}

function closeLog() { document.getElementById('log-overlay').classList.remove('open'); }

function clearLog() {
  if (confirm('Clear all workout history?')) { saveLog([]); openLog(); showToast('History cleared'); }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// INIT
document.getElementById('today-date').textContent = todayFmt();
['a','b','c'].forEach(function(day) { state[day] = initState(day); });
renderDay('a'); renderDay('b'); renderDay('c');
document.getElementById('view-b').classList.add('hidden');
document.getElementById('view-c').classList.add('hidden');
</script>
</body>
